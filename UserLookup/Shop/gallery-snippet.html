
<!-- snippet for hiding NPC toolbars and sidebar -->

<textarea>
<style>

/*---------HIDE DEFAULT NPC BARS ---------- */
/*
If you are NOT HIDING any of these elements,
just delete their line from the list .
--------------------------------------------------*/

.navhover, /*left sidebar*/
#mb, /*bottom edge of left sidebar*/
.hdr, /*top toolbar on default theme*/
#hdr, /*page-specific art header*/
.footertext /*legal text at bottom*/
    {
    display:none;
    }  

/*---------VARIABLES MY BELOVED  ---------- */
/* You can change your entire layout color scheme
in one section, as long as you're consistent.
Notice when the variables are used, the format is
var(--name-of-variable);
--------------------------------------------------*/

:root{
    --bg-color: #ffd9da;
    --sidebar-bg-color: rgb(194 151 255);
    --border-color: #400c26;
    /*if you want your sidebar partly transparent,
    use rgba instead e.g. rgba(194, 151, 255, 0.5) */

    --shadow: 5px 5px 20px rgba(138, 112, 138, 0.5);

    --main-font: "Arial Narrow", Verdana, sans-serif;
    --main-font-color: #400c26;

    --header-font: Lucida, serif;
    --header-font-color: #400c26;

    --special-font: Courier, monospace;
    --special-font-color: goldenrod;
}


/*  OPTIONAL CUSTOM NPC top toolbar.
You CAN'T style the left sidebar because 
it uses baked-in images, BUT...
You CAN style the top toolbar to be transparent/use custom fonts.
That's important if your bg makes it hard to read.  
I usually just hide it, though.*/

#sfp_nav{
    color: var(--main-font-color);
}

/* -------------------SIDEBAR TRICKS---------------------------- */
/* OPINION....
I think the right-hand sidebar should always be visible
on activity pages like user shops. Buuuut...
if you just want to hide it entirely, use the section at the end
 - search "PURIST" :P
------------------------------------------------------------- */


/* -------------OPTIONAL EXPLANATION--------------- */
/* .sidebar-container has 3 main sub-sections.
You MUST remove the bg image for ALL three of these.
-------------------------------------------------------*/

.sidebar-section.st,
.sidebar-section.se,
.sidebar-section.sm-filler{
    background-image:none;
}

.sidebar-section{padding: 0; } /*optional but nicer*/

/* ----- KEY STYLING FOR RIGHT SIDEBAR ------- */

.sidebar-container{
    /* REGULAR LOOK */
    background-color: var(--sidebar-bg-color);
    color: var(--header-font-color);
    border-radius: 20px;
    box-shadow: var(--shadow);
    
    /* DIMENSIONS
    I like to make the sidebar just small enough
    to see the RS timers. It scrolls. */
    position: absolute;
    transform: translateX(50px);
    min-height: 0; /*necessary or it ignores height*/
    height: 320px;
    overflow: scroll;
}

/* target specific sidebar fonts */
.sidebar-container a, .sidebar-container p,
.sidebar-container b, .sidebar-container td,
#sfp_am_txt, .sfp_clk_txt, .sfp_clk_txt font{
    color: var(--header-font-color);
}

/* optional but helps clocks be legible */
.sfp_clk_txt font{font-weight: bolder;}

/* style the RS and RE timers */
#sfp_clock{
    background-color: var(--sidebar-bg-color);
    color: var(--header-font-color);
    border-color: var(--border-color);
}
    </style>
</textarea>
